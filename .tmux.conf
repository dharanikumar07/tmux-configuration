# ==============================
# PLUGINS
# ==============================

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# UI Theme
set -g @plugin 'catppuccin/tmux'

# Catppuccin options (clean style)
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style 'basic'

# Force using window name instead of pane title
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"


# ==============================
# GENERAL SETTINGS
# ==============================

set -g default-terminal "screen-256color"
set -g mouse on
set -s escape-time 0

# Disable auto rename (FIX)
set -g automatic-rename off
set -g allow-rename off

# Start indexing from 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar at bottom
set -g status-position bottom

# Refresh rate
set -g status-interval 5

# Status bar length
set -g status-left-length 50
set -g status-right-length 100


# ==============================
# ENHANCED STATUS BAR UI
# ==============================

# LEFT: Session name
set -g status-left "#[fg=#a6e3a1,bold] #S "

# CENTER: Windows (handled by catppuccin but enforced above)

# RIGHT: Git + Pane + Time (safe git check)
set -g status-right "#(git rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo '🌿 '$(git rev-parse --abbrev-ref HEAD)) #[fg=#89dceb]⚙ #{window_panes} #[fg=#cba6f7]🕒 %H:%M "


# ==============================
# OPTION MODE (NO PREFIX - FAST LOCAL)
# ==============================

# New window
bind -n M-c new-window

# Window navigation
bind -n M-] next-window
bind -n M-[ previous-window

# Jump to windows
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

# Rename window
bind -n M-, command-prompt -I "#W" "rename-window '%%'"

# Split panes
bind -n M-v split-window -h
bind -n M-h split-window -v

# Pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# ==============================
# SESSION SWITCHER (OPTION MODE)
# ==============================

bind -n M-s choose-tree -s


# ==============================
# SAFE ACTIONS (OPTION MODE)
# ==============================

# Detach
bind -n M-d display-message "Detaching session..." \; run-shell "sleep 0.27" \; detach-client


# Kill pane (confirm)
bind -n M-q confirm-before -p "#[fg=#ff6b6b,bold]🚨 Kill pane? (y/n)" kill-pane

# Kill window (confirm)
bind -n M-w confirm-before -p "#[fg=#ff6b6b,bold]🚨 Kill window? (y/n)" kill-window


# ==============================
# PREFIX MODE (Ctrl + Space - SSH SAFE)
# ==============================

# Remove default prefix
unbind C-b

# Set new prefix
set -g prefix C-Space
bind C-Space send-prefix


# Window controls
bind c new-window
bind n next-window
bind p previous-window

bind ] next-window
bind [ previous-window

# Jump windows
bind 0 select-window -t 0
bind 1 select-window -t 1
bind 2 select-window -t 2

# Rename window
bind , command-prompt -I "#W" "rename-window '%%'"

# Split panes
bind v split-window -h
bind h split-window -v

# Pane navigation
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D


# ==============================
# SESSION SWITCHER (PREFIX MODE)
# ==============================

bind s choose-tree -s


# ==============================
# SAFE ACTIONS (PREFIX MODE)
# ==============================

# Detach
bind d display-message "Detaching session..." \; run-shell "sleep 0.27" \; detach-client

# Kill pane (confirm)
bind q confirm-before -p "#[fg=#ff6b6b,bold]🚨 Kill pane? (y/n)" kill-pane

# Kill window (confirm)
bind w confirm-before -p "#[fg=#ff6b6b,bold]🚨 Kill window? (y/n)" kill-window


# ==============================
# RELOAD CONFIG
# ==============================

bind r source-file ~/.tmux.conf \; display "Config Reloaded!"


# ==============================
# TMUX PLUGIN MANAGER (TPM)
# ==============================

set -g @plugin 'tmux-plugins/tpm'

# MUST be last
run '~/.tmux/plugins/tpm/tpm'
